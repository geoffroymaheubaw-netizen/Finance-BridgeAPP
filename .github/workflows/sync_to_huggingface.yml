name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ] || [[ "VOTRE_PSEUDO_HF" == *"VOTRE_PSEUDO"* ]]; then
            echo "HF_TOKEN ou identifiants Hugging Face non configurés. Étape ignorée."
            exit 0
          fi
          git push --force https://VOTRE_PSEUDO_HF:${HF_TOKEN}@huggingface.co/spaces/VOTRE_PSEUDO_HF/NOM_DE_VOTRE_SPACE main:main
